<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Calculator body -->
  <rect x="4" y="4" width="24" height="24" rx="2" ry="2" fill="#dc2626" stroke="#b91c1c" stroke-width="1"/>

  <!-- Display screen -->
  <rect x="6" y="6" width="20" height="6" rx="1" ry="1" fill="#1f2937"/>

  <!-- Display text -->
  <text x="16" y="10.5" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="3" font-weight="bold">AI</text>

  <!-- Calculator buttons -->
  <!-- Row 1 -->
  <rect x="6" y="14" width="4" height="3" rx="0.5" fill="#f3f4f6" stroke="#d1d5db" stroke-width="0.5"/>
  <rect x="11" y="14" width="4" height="3" rx="0.5" fill="#f3f4f6" stroke="#d1d5db" stroke-width="0.5"/>
  <rect x="16" y="14" width="4" height="3" rx="0.5" fill="#f3f4f6" stroke="#d1d5db" stroke-width="0.5"/>
  <rect x="21" y="14" width="5" height="3" rx="0.5" fill="#ef4444" stroke="#dc2626" stroke-width="0.5"/>

  <!-- Row 2 -->
  <rect x="6" y="18" width="4" height="3" rx="0.5" fill="#f3f4f6" stroke="#d1d5db" stroke-width="0.5"/>
  <rect x="11" y="18" width="4" height="3" rx="0.5" fill="#f3f4f6" stroke="#d1d5db" stroke-width="0.5"/>
  <rect x="16" y="18" width="4" height="3" rx="0.5" fill="#f3f4f6" stroke="#d1d5db" stroke-width="0.5"/>
  <rect x="21" y="18" width="5" height="3" rx="0.5" fill="#ef4444" stroke="#dc2626" stroke-width="0.5"/>

  <!-- Row 3 -->
  <rect x="6" y="22" width="4" height="3" rx="0.5" fill="#f3f4f6" stroke="#d1d5db" stroke-width="0.5"/>
  <rect x="11" y="22" width="4" height="3" rx="0.5" fill="#f3f4f6" stroke="#d1d5db" stroke-width="0.5"/>
  <rect x="16" y="22" width="4" height="3" rx="0.5" fill="#f3f4f6" stroke="#d1d5db" stroke-width="0.5"/>
  <rect x="21" y="22" width="5" height="3" rx="0.5" fill="#ef4444" stroke="#dc2626" stroke-width="0.5"/>

  <!-- Bottom row -->
  <rect x="6" y="26" width="9" height="2" rx="0.5" fill="#f3f4f6" stroke="#d1d5db" stroke-width="0.5"/>
  <rect x="16" y="26" width="4" height="2" rx="0.5" fill="#f3f4f6" stroke="#d1d5db" stroke-width="0.5"/>
  <rect x="21" y="26" width="5" height="2" rx="0.5" fill="#10b981" stroke="#059669" stroke-width="0.5"/>

  <!-- Button dots/symbols (simplified) -->
  <circle cx="8" cy="15.5" r="0.3" fill="#6b7280"/>
  <circle cx="13" cy="15.5" r="0.3" fill="#6b7280"/>
  <circle cx="18" cy="15.5" r="0.3" fill="#6b7280"/>
  <text x="23.5" y="16" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="1.5" font-weight="bold">$</text>
</svg>