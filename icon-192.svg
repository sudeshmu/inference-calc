  <!-- Display text -->
  <text x="96" y="63" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="18" font-weight="bold">AI CALC</text>

  <!-- Calculator buttons -->
  <!-- Row 1 -->
  <rect x="36" y="84" width="24" height="18" rx="3" fill="#f3f4f6" stroke="#d1d5db" stroke-width="3"/>
  <rect x="66" y="84" width="24" height="18" rx="3" fill="#f3f4f6" stroke="#d1d5db" stroke-width="3"/>
  <rect x="96" y="84" width="24" height="18" rx="3" fill="#f3f4f6" stroke="#d1d5db" stroke-width="3"/>
  <rect x="126" y="84" width="30" height="18" rx="3" fill="#ef4444" stroke="#dc2626" stroke-width="3"/>

  <!-- Row 2 -->
  <rect x="36" y="108" width="24" height="18" rx="3" fill="#f3f4f6" stroke="#d1d5db" stroke-width="3"/>
  <rect x="66" y="108" width="24" height="18" rx="3" fill="#f3f4f6" stroke="#d1d5db" stroke-width="3"/>
  <rect x="96" y="108" width="24" height="18" rx="3" fill="#f3f4f6" stroke="#d1d5db" stroke-width="3"/>
  <rect x="126" y="108" width="30" height="18" rx="3" fill="#ef4444" stroke="#dc2626" stroke-width="3"/>

  <!-- Row 3 -->
  <rect x="36" y="132" width="24" height="18" rx="3" fill="#f3f4f6" stroke="#d1d5db" stroke-width="3"/>
  <rect x="66" y="132" width="24" height="18" rx="3" fill="#f3f4f6" stroke="#d1d5db" stroke-width="3"/>
  <rect x="96" y="132" width="24" height="18" rx="3" fill="#f3f4f6" stroke="#d1d5db" stroke-width="3"/>
  <rect x="126" y="132" width="30" height="18" rx="3" fill="#ef4444" stroke="#dc2626" stroke-width="3"/>

  <!-- Bottom row -->
  <rect x="36" y="156" width="54" height="12" rx="3" fill="#f3f4f6" stroke="#d1d5db" stroke-width="3"/>
  <rect x="96" y="156" width="24" height="12" rx="3" fill="#f3f4f6" stroke="#d1d5db" stroke-width="3"/>
  <rect x="126" y="156" width="30" height="12" rx="3" fill="#10b981" stroke="#059669" stroke-width="3"/>

  <!-- Button symbols -->
  <circle cx="48" cy="93" r="1.8" fill="#6b7280"/>
  <circle cx="78" cy="93" r="1.8" fill="#6b7280"/>
  <circle cx="108" cy="93" r="1.8" fill="#6b7280"/>
  <text x="141" y="96" text-anchor="middle" fill="#ffffff" font-family="Arial" font-size="9" font-weight="bold">$</text>
