<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Calculator body -->
  <rect x="24" y="24" width="144" height="144" rx="12" ry="12" fill="#dc2626" stroke="#b91c1c" stroke-width="6"/>

  <!-- Display screen -->
